name: Promote to Production

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  promote:
    name: Fast-forward branch production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward production to main
        run: |
          git checkout production || git checkout -b production
          git merge --ff-only origin/main
          git push origin production

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # ssh-keyscan pode retornar não-zero num blip de rede do runner e,
          # sob `bash -e`, derrubaria o step. Tenta algumas vezes; só falha
          # (com mensagem clara) se nenhuma host key for capturada.
          for i in 1 2 3 4 5; do
            ssh-keyscan -H -T 15 "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan tentativa $i falhou; aguardando 5s..."
            sleep 5
          done
          test -s ~/.ssh/known_hosts \
            || { echo "::error::ssh-keyscan não obteve a host key de ${{ secrets.VPS_HOST }} (host inacessível pelo runner?)"; exit 1; }

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "cd /home/deploy/andrequice && git fetch origin production && git checkout production && git reset --hard origin/production && FORCE_DEPLOY=true bash deploy/scripts/update.sh"

      - name: Notify success
        run: |
          echo "✅ Branch production atualizada e deploy iniciado em $(git rev-parse --short HEAD)"
