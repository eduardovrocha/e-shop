name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy → update.sh
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run update.sh on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "bash /home/deploy/andrequice/deploy/scripts/update.sh"
