default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST", "host.docker.internal") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "andrequice_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB_TEST", "andrequice_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "andrequice_production") %>
  sslmode: "<%= ENV.fetch('POSTGRES_SSLMODE', Rails.env.production? ? 'require' : 'prefer') %>"
