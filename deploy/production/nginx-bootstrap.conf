# ─── nginx-bootstrap.conf — HTTP only (pré-SSL) ──────────────────────────────
# Usado APENAS durante o bootstrap inicial, antes dos certificados Let's Encrypt.
# Substituir por nginx.conf após emitir os certs com ssl-init.sh.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    server_tokens off;

    upstream api_backend    { server api:3000; }
    upstream frontend_app   { server frontend:3001; }
    upstream dashboard_app  { server dashboard:3002; }

    # Serve ACME challenge + proxy temporário via HTTP
    server {
        listen 80;
        server_name andrequice.store www.andrequice.store
                    api.andrequice.store
                    dashboard.andrequice.store
                    storage.andrequice.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name api.andrequice.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name dashboard.andrequice.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /admin/ {
            proxy_pass http://dashboard_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://dashboard_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
