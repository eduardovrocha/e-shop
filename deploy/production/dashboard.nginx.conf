# ─── Dashboard admin — Nginx (container interno) ─────────────────────────────
# Este arquivo configura o Nginx DENTRO do container do dashboard.
# O reverse proxy principal (nginx service no compose) encaminha para cá.
# ─────────────────────────────────────────────────────────────────────────────

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml;

server {
    listen 3002;
    server_name _;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets estáticos com cache longo ──────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|avif|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Headers de segurança ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.andrequice.store https://*.ingest.sentry.io https://viacep.com.br; object-src 'none'; base-uri 'self'; form-action 'self';" always;
}
