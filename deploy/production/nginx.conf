# ─── Nginx — Reverse Proxy Principal ────────────────────────────────────────
# Gerencia SSL, HSTS e roteamento para frontend, dashboard e API
# Ajustar os server_name conforme domínios reais
# ────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    tcp_nopush   on;
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Compressão global ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream api_backend {
        server api:3000;
    }

    upstream frontend_app {
        server frontend:3001;
    }

    upstream dashboard_app {
        server dashboard:3002;
    }

    upstream minio_storage {
        server minio:9000;
    }

    # ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
    server {
        listen 80;
        server_name andrequice.store www.andrequice.store
                    api.andrequice.store
                    dashboard.andrequice.store
                    storage.andrequice.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend público ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name andrequice.store www.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── API Rails ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/api.andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        client_max_body_size 20M;

        # Webhook Stripe — sem rate limit para não perder eventos
        location /webhooks/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Login admin — rate limit agressivo
        location /admin/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Demais rotas da API
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── MinIO Storage público ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name storage.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/storage.andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/storage.andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        client_max_body_size 100M;

        location / {
            proxy_pass http://minio_storage;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # ── MinIO Console — acesso apenas via túnel SSH ───────────────────────────
    # NÃO há server block público para o console MinIO (porta 9001).
    # O container minio escuta :9001 apenas na rede interna Docker.
    # Para acessar o console: ssh -L 9001:localhost:9001 deploy@IP_DA_VPS
    # Depois abrir http://localhost:9001 no browser local.

    # ── Dashboard admin ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name dashboard.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/dashboard.andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://dashboard_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
