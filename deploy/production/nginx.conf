# ─── Nginx — Reverse Proxy Principal ────────────────────────────────────────
# Gerencia SSL, HSTS e roteamento para frontend, dashboard e API
# Ajustar os server_name conforme domínios reais
# ────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    tcp_nopush   on;
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Compressão global ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ── CORS dinâmico para erros do upstream (502/503) ────────────────────────
    # Quando o upstream falha, o nginx responde diretamente sem passar pelos
    # headers CORS que o Rails adicionaria, fazendo o browser reportar erro de
    # CORS em vez do 502 real. Este map garante o header correto em qualquer
    # resposta, inclusive erros gerados pelo próprio nginx.
    map $http_origin $cors_origin {
        default                                  "";
        "https://andrequice.store"               "https://andrequice.store";
        "https://www.andrequice.store"           "https://www.andrequice.store";
        "https://dashboard.andrequice.store"     "https://dashboard.andrequice.store";
    }

    # ── WebSocket upgrade — usado por /cable ──────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream api_backend {
        server api:3000;
    }

    upstream frontend_app {
        server frontend:3001;
    }

    upstream dashboard_app {
        server dashboard:3002;
    }

    upstream minio_storage {
        server minio:9000;
    }

    # ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
    server {
        listen 80;
        server_name andrequice.store www.andrequice.store
                    api.andrequice.store
                    dashboard.andrequice.store
                    storage.andrequice.store;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend público ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name andrequice.store www.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"                        always;
        add_header X-Frame-Options           "SAMEORIGIN"                                                          always;
        add_header X-Content-Type-Options    "nosniff"                                                             always;
        add_header X-XSS-Protection          "1; mode=block"                                                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"                                     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"                            always;
        # CSP espelha frontend.nginx.conf — ambas as camadas aplicam a mesma política (defesa em profundidade)
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://api.andrequice.store https://storage.andrequice.store https://placehold.co; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.andrequice.store https://api.stripe.com https://*.ingest.sentry.io https://viacep.com.br; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # ── Modo manutenção ───────────────────────────────────────────────────
        # Ativado pela presença de /var/www/maintenance/enabled (toca via
        # deploy/scripts/maintenance). Default = inativo. Serve um HTML estático
        # independente do React — funciona com a stack inteira derrubada.
        set $maintenance 0;
        if (-f /var/www/maintenance/enabled) { set $maintenance 1; }
        # Bypass por IP — descomentar e ajustar para ver a página de manutenção
        # sem afetar usuários reais:
        # if ($remote_addr = "SEU.IP.AQUI") { set $maintenance 0; }

        location / {
            if ($maintenance = 1) { return 503; }
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 503 @maintenance_html;
        location @maintenance_html {
            root /var/www/maintenance;
            rewrite ^.*$ /index.html break;
            add_header Cache-Control "no-store, must-revalidate" always;
            add_header Retry-After   "3600"                      always;
            add_header X-Robots-Tag  "noindex"                   always;
            internal;
        }
    }

    # ── API Rails ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/api.andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        # API não serve HTML — CSP mínimo para prevenir data exfiltration via headers
        add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none';" always;

        client_max_body_size 20M;

        # CORS — single source of truth no nginx.
        # Rack::Cors do Rails também adiciona Access-Control-Allow-Origin
        # quando o request tem Origin permitido; sem o hide abaixo o browser
        # vê o header duplicado ("https://andrequice.store, https://andrequice.store")
        # e bloqueia. Hidamos o header do upstream para garantir uma única
        # ocorrência, vinda do add_header abaixo. Os demais headers CORS
        # (Methods, Credentials, Expose-Headers, Max-Age) seguem vindo do
        # Rails, que já tem semântica dinâmica baseada em CORS_ORIGINS.
        proxy_hide_header Access-Control-Allow-Origin;

        # ── Modo manutenção ───────────────────────────────────────────────────
        # API responde 503 + JSON quando o flag está presente. As exceções
        # abaixo (health checks e webhook Stripe) passam SEMPRE, mesmo em
        # manutenção — senão o pipeline quebra e ficamos com pedidos órfãos.
        set $maintenance 0;
        if (-f /var/www/maintenance/enabled) { set $maintenance 1; }
        # if ($remote_addr = "SEU.IP.AQUI") { set $maintenance 0; }

        # Health checks — nunca bloqueados (Docker healthcheck e update.sh).
        location = /up {
            access_log off;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /api/v1/health {
            access_log off;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webhook Stripe REAL — POST /api/v1/payments/webhook (ver
        # stripe_raw_body_middleware.rb). NUNCA bloqueado; sem rate limit.
        location = /api/v1/payments/webhook {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Path legado /webhooks/ — mantido como estava (sem rota Rails real).
        location /webhooks/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Login admin — rate limit agressivo. Bloqueado em manutenção (admin off).
        location /admin/auth/login {
            if ($maintenance = 1) { return 503; }
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Action Cable — também exposto via api host (preventivo / debug interno).
        # Mesma config do server block dashboard: HTTP/1.1, upgrade, buffering off.
        location /cable {
            if ($maintenance = 1) { return 503; }
            proxy_pass http://api_backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         $connection_upgrade;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_buffering    off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Demais rotas da API
        location / {
            if ($maintenance = 1) { return 503; }
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Resposta JSON de manutenção (503). Health/webhook já passaram acima.
        error_page 503 @maintenance_json;
        location @maintenance_json {
            default_type application/json;
            root /var/www/maintenance;
            rewrite ^.*$ /api.json break;
            add_header Cache-Control "no-store, must-revalidate" always;
            add_header Retry-After   "3600"                      always;
            add_header Access-Control-Allow-Origin $cors_origin  always;
            internal;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
    }

    # ── MinIO Storage público ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name storage.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/storage.andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/storage.andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        # Storage serve apenas objetos (imagens) — CSP restritivo
        add_header Content-Security-Policy   "default-src 'none'; img-src 'self'; object-src 'none';" always;

        client_max_body_size 100M;

        location / {
            proxy_pass http://minio_storage;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    # ── MinIO Console — acesso apenas via túnel SSH ───────────────────────────
    # NÃO há server block público para o console MinIO (porta 9001).
    # O container minio escuta :9001 apenas na rede interna Docker.
    # Para acessar o console: ssh -L 9001:localhost:9001 deploy@IP_DA_VPS
    # Depois abrir http://localhost:9001 no browser local.

    # ── Dashboard admin ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name dashboard.andrequice.store;

        ssl_certificate     /etc/letsencrypt/live/dashboard.andrequice.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.andrequice.store/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"                        always;
        add_header X-Frame-Options           "SAMEORIGIN"                                                          always;
        add_header X-Content-Type-Options    "nosniff"                                                             always;
        add_header X-XSS-Protection          "1; mode=block"                                                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"                                     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"                            always;
        # CSP espelha dashboard.nginx.conf — ambas as camadas aplicam a mesma política (defesa em profundidade)
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.andrequice.store https://*.ingest.sentry.io https://viacep.com.br; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # ── Modo manutenção (mesmo mecanismo do storefront) ───────────────────
        # Admin inteiro entra em manutenção, Action Cable junto (decisão 0.7).
        set $maintenance 0;
        if (-f /var/www/maintenance/enabled) { set $maintenance 1; }
        # if ($remote_addr = "SEU.IP.AQUI") { set $maintenance 0; }

        # Action Cable — mesmo-origem com o dashboard.
        # O proxy sobe a conexão para HTTP/1.1 com Upgrade/Connection
        # e encaminha para o container da API. proxy_buffering off é
        # obrigatório em WebSocket; timeouts longos seguram a conexão.
        location /cable {
            if ($maintenance = 1) { return 503; }
            proxy_pass http://api_backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         $connection_upgrade;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_buffering    off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            if ($maintenance = 1) { return 503; }
            proxy_pass http://dashboard_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 503 @maintenance_html;
        location @maintenance_html {
            root /var/www/maintenance;
            rewrite ^.*$ /index.html break;
            add_header Cache-Control "no-store, must-revalidate" always;
            add_header Retry-After   "3600"                      always;
            add_header X-Robots-Tag  "noindex"                   always;
            internal;
        }
    }
}
