server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                                      always;
    add_header X-Content-Type-Options    "nosniff"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"           always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"       always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.stripe.com; frame-ancestors 'none';" always;

    # SPA routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # No cache for index.html (must always be fresh)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
