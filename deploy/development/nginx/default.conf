# Docker's internal DNS resolver — necessary for dynamic upstream resolution
# when containers are recreated (IPs change).
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api {
        set $upstream_backend backend:3000;
        proxy_pass         http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
    }

    # ── ActionCable WebSocket ─────────────────────────────────────────────────
    location /cable {
        set $upstream_backend backend:3000;
        proxy_pass         http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600;
        proxy_send_timeout    3600;
    }

    # ── ActiveStorage / Rails engine ──────────────────────────────────────────
    location /rails {
        set $upstream_backend backend:3000;
        proxy_pass         http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dashboard admin (base: /admin/) ───────────────────────────────────────
    location /admin {
        set $upstream_dashboard dashboard:3092;
        proxy_pass         http://$upstream_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout    3600;
        proxy_send_timeout    3600;
    }

    # ── Frontend público + HMR WebSocket (catch-all) ──────────────────────────
    location / {
        set $upstream_frontend frontend:5173;
        proxy_pass         http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout    3600;
        proxy_send_timeout    3600;
    }
}
