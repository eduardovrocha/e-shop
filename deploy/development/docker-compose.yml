name: andrequice

networks:
  andrequice-network:
    driver: bridge

volumes:
  bundle_cache:
  node_modules:
  dashboard_node_modules:
  active_storage_data:

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/development/backend.Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - ../../source/backend:/rails
      - bundle_cache:/home/rails/bundle
      - active_storage_data:/rails/storage
    ports:
      - "3091:3000"
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-andrequice_development}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-suporte@andrequice.store}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT:-}
      # E-mail transacional (deixe vazio em dev para não enviar)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      # HOST_URL é sobrescrito por start.sh com o IP local detectado automaticamente
      HOST_URL: ${HOST_URL:-http://localhost}
      # CORS_ORIGINS é ignorado em development — cors.rb aceita qualquer IP privado
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3092}
      SENTRY_DSN: ${SENTRY_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    networks:
      - andrequice-network

  sidekiq:
    build:
      context: ../..
      dockerfile: deploy/development/backend.Dockerfile
    command: bundle exec sidekiq -C config/sidekiq.yml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'sidekiq' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ../../source/backend:/rails
      - bundle_cache:/home/rails/bundle
      - active_storage_data:/rails/storage
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-andrequice_development}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-suporte@andrequice.store}
      SENTRY_DSN: ${SENTRY_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - andrequice-network

  frontend:
    build:
      context: ../..
      dockerfile: deploy/development/frontend.Dockerfile
    restart: unless-stopped
    volumes:
      - ../../source/frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "3090:5173"
    environment:
      NODE_ENV: development
      # start.sh exporta LOCAL_IP e sobrescreve este valor automaticamente
      VITE_API_URL: ${VITE_API_URL:-/api/v1}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    stdin_open: true
    tty: true
    networks:
      - andrequice-network

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/development/dashboard.Dockerfile
    restart: unless-stopped
    volumes:
      - ../../source/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "3092:3092"
    environment:
      NODE_ENV: development
      # start.sh exporta LOCAL_IP e sobrescreve este valor automaticamente
      VITE_API_URL: ${VITE_API_URL:-/api/v1}
      VITE_APP_NAME: ${VITE_APP_NAME:-Andrequicé Admin}
    stdin_open: true
    tty: true
    networks:
      - andrequice-network

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "80:80"
    volumes:
      - ../../deploy/development/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../deploy/development/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - dashboard
      - backend
    networks:
      - andrequice-network
